# PyBatGym Config: medium_platform.xml (8 compute nodes × 4 cores = 32 cores)
# Use: load_preset("medium_batsim") in Python

mode: mock

platform:
  total_nodes: 8
  cores_per_node: 4

workload:
  source: trace
  trace_path: /workspace/data/workloads/medium_workload.json
  num_jobs: 100
  max_job_runtime: 100.0
  max_job_cores: 32
  seed: 42

episode:
  max_simulation_time: 50000.0
  max_steps: 5000

observation:
  top_k_jobs: 10
  max_queue_length: 200
  max_waiting_time: 5000.0
  max_bounded_slowdown: 100.0

reward_weights:
  utilization: 0.3
  waiting_time: 0.5
  slowdown: 0.15
  throughput: 0.05

reward_type: hybrid
