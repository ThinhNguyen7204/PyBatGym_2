# PyBatGym Default Configuration
# Matches small_platform.xml (4 compute hosts × 1 core = 4 cores)
# See docs/GUIDE.md for all options

mode: mock  # mock (fast dev) | real (BatSim)

platform:
  total_nodes: 4
  cores_per_node: 1

workload:
  source: trace
  trace_path: /workspace/data/workloads/medium_workload.json
  num_jobs: 100
  max_job_runtime: 100.0
  max_job_cores: 4
  seed: 42

episode:
  max_simulation_time: 10000.0
  max_steps: 500

observation:
  top_k_jobs: 10
  max_queue_length: 150
  max_waiting_time: 3000.0
  max_bounded_slowdown: 100.0

reward_weights:
  utilization: 0.3
  waiting_time: 0.5
  slowdown: 0.15
  throughput: 0.05

reward_type: hybrid

plugins: []
