# PyBatGym Config: small_platform.xml (4 compute hosts × 1 core)
# Use: load_preset("small_batsim") in Python

mode: mock

platform:
  total_nodes: 4
  cores_per_node: 1

workload:
  source: trace
  trace_path: /workspace/data/workloads/medium_workload.json
  num_jobs: 100

episode:
  max_simulation_time: 10000.0
  max_steps: 500

observation:
  top_k_jobs: 10
  max_queue_length: 150
  max_waiting_time: 3000.0

reward_weights:
  utilization: 0.3
  waiting_time: 0.5
  slowdown: 0.15
  throughput: 0.05

reward_type: hybrid
