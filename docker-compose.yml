version: "3.9"

# ============================================================
# PyBatGym Docker Compose
#
# Người dùng mới chỉ cần:
#   docker-compose up         → mở shell tại /workspace, venv tự setup
#
# Các lệnh khác:
#   docker-compose run test   → chạy test_trace.py
#   docker-compose run train  → chạy PPO training
# ============================================================

x-base: &base
  image: ghcr.io/khiemvuong/pybatgym:latest
  volumes:
    - .:/workspace            # code từ host mount vào container
    - pybatgym-logs:/workspace/logs
  working_dir: /workspace
  environment:
    - PYTHONUNBUFFERED=1

services:

  # ── Mặc định: mở shell tại /workspace ─────────────────
  # Chạy: docker-compose up
  # hoặc: docker-compose run shell
  shell:
    <<: *base
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "/workspace/entrypoint.sh"]

  # ── Chạy trace test (kết quả ngay ~5 giây) ────────────
  # Chạy: docker-compose run test
  test:
    <<: *base
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "source /workspace/entrypoint.sh 2>/dev/null;
       python3 examples/test_trace.py"

  # ── PPO Training ───────────────────────────────────────
  # Chạy: docker-compose run train
  train:
    <<: *base
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "source /workspace/entrypoint.sh 2>/dev/null;
       python3 examples/train_ppo_trace.py"

  # ── Unit tests ─────────────────────────────────────────
  # Chạy: docker-compose run pytest
  pytest:
    <<: *base
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "source /workspace/entrypoint.sh 2>/dev/null;
       python3 -m pytest tests/ -v"

  # ── TensorBoard ────────────────────────────────────────
  # Chạy: docker-compose up tensorboard
  # Xem tại: http://localhost:6006
  tensorboard:
    <<: *base
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "source /workspace/.venv_ubuntu/bin/activate;
       tensorboard --logdir logs/tensorboard_ppo --bind_all --port 6006"
    ports:
      - "6006:6006"

volumes:
  pybatgym-logs:
